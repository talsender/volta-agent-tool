<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volta Solar — כלי נציגים</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo">Volta <span>Solar</span></div>
      <div class="subtitle">כלי נציגים — בדיקת יישובים וכשירות גג</div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="settlement">📍 בדיקת יישוב</button>
      <button class="tab" data-tab="wizard">🏠 כשירות גג</button>
    </nav>

    <!-- Tab 1: Settlement Check -->
    <section id="tab-settlement" class="tab-content active">
      <div class="search-label">הקלד שם יישוב של הלקוח:</div>
      <div class="search-box">
        <input id="settlement-input" class="search-input" type="text"
          placeholder="לדוגמה: רמת השרון, מגדל העמק..." autocomplete="off">
      </div>
      <div id="suggestions" class="suggestions hidden"></div>
      <div id="settlement-result" class="result-area"></div>
      <div id="data-status" class="data-status"></div>
    </section>

    <!-- Tab 2: Qualification Wizard -->
    <section id="tab-wizard" class="tab-content hidden">
      <div id="wizard-container"></div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="settlements.js"></script>
  <script src="wizard.js"></script>
  <script src="app.js"></script>
</body>
</html>
